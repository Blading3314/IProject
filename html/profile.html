<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link type="text/css" href="../css/header.css" rel="stylesheet">
    <link type="text/css" href="../css/footer.css" rel="stylesheet">
    <link type="text/css" href="../css/profile.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script type="text/javascript" src="../js/profile.js" defer></script>
    <script type="text/javascript" src="../js/header.js"></script>
    <script type="text/javascript" src="../js/footer.js"></script>
</head>

<body>
    <header id="header-container"></header>

    <main class="main-container">
        <section class="profile-container">
            <h1>Profile</h1>

            <div class="profile-summary">
                <p><strong>Name:</strong> <span id="display-name"></span></p>
                <p><strong>Email:</strong> <span id="display-email"></span></p>
                <p><strong>Phone:</strong> <span id="display-phone"></span></p>
                <p><strong>Address:</strong> <span id="display-address"></span></p>
            </div>

            <form id="profile-form">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>

                <label for="phone">Phone</label>
                <input type="tel" id="phone" name="phone" required>

                <label for="address">Address</label>
                <input type="text" id="address" name="address" required>

                <button type="submit">Save Changes</button>
            </form>

            <p id="profile-message" class="success"></p>
        </section>
    </main>

    <footer id="footer-container"></footer>
</body>

</html>
