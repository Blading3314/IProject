<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title></title>
    <link type="text/css" href="../css/register.css" rel="stylesheet">
    <link type="text/css" href="../css/header.css" rel="stylesheet">
    <link type="text/css" href="../css/footer.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script type="text/javascript" src="../js/register.js" defer></script>
</head>

<body>
    <header class="header-container">
        <hgroup class="header-left">
            <div class="logo"><a href="index.html"><img id="header-logo" src="../images/logo.png" alt="logo.png"></a>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="plp.html">Products</a></li>
                    <li><a href="about.html">About</a></li>
                </ul>
            </nav>
        </hgroup>
        <hgroup class="header-right">
            <input type="search" placeholder="Search products..." id="search-input" class="search-bar">
            <button id="search-button" class="search-bar" onclick="">
                <img class="icon-search" src="../images/icon-search.png">
            </button>
            <div id="search-dropdown" class="search-bar"></div>
            <a href="cart.html">
                <img class="icon-cart" src="../images/icon-cart.png">
                <span id="cart-count"></span>
            </a>
            <a href="login.html">
                <img class="icon-account" src="../images/icon-account.png">
            </a>
        </hgroup>
    </header>

    <main class="main-container">
        <div class="register-container">
            <h1>Create Account</h1>
            <form id="register-form">
                <label for="name" required>Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your name" required>

                <label for="email" required>Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email address" required>

                <label for="password" required>Password</label>
                <input type="password" id="password" placeholder="Enter password" required>

                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm password" required>

                <button type="submit">Register</button>
            </form>
            <p id="register-message" class="error"></p>
            <p>
                Already have an account? <a href="login.html">Login here</a>
            </p>
        </div>
    </main>

    <footer class="footer-container">
        <div class="footer-group">
            <div class="footer-content-1">
                <h3>Shop by Category</h3>
                <ul>
                    <li><a href="plp.html">Men's Clothing</a></li>
                    <li><a href="plp.html">Women's Clothing</a></li>
                    <li><a href="plp.html">Jewelry</a></li>
                    <li><a href="plp.html">Electronics</a></li>
                </ul>
            </div>
            <div class="footer-content-2">
                <h3>Contact Us</h3>
                <p>Email: support@example.com</p>
                <p>Phone: +1 (514)-555-5555</p>
            </div>
            <div class="footer-content-3">
                <h3>Subcribe to our Newsletter</h3>
                <input type="email" placeholder="Your email address">
                <button id="subscribe-button">Subscribe</button>
            </div>
            <div class="footer-content-4">
                <h3>Follow Us</h3>
                <a href="#"><img src="../images/icon-facebook.png" alt="">
                    <a href="#"><img src="../images/icon-twitter.png" alt="">
                        <a href="#"><img src="../images/icon-instagram.png" alt="">
            </div>
        </div>
    </footer>
</body>

</html>
