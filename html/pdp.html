<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details Page</title>

  <link type="text/css" href="../css/pdp.css" rel="stylesheet">
  <link type="text/css" href="/css/header.css" rel="stylesheet">
  <link type="text/css" href="/css/footer.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script type="text/javascript" src="../js/pdp.js" defer></script>
  <script type="text/javascript" src="/js/header.js"></script>
  <script type="text/javascript" src="/js/footer.js"></script>
</head>

<body>
  <header class="header-container">
    <hgroup class="header-left">
      <div class="logo"><a href="index.html"><img id="header-logo" src="../images/logo.png" alt="logo.png"></a></div>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="plp.html">Products</a></li>
          <li><a href="about.html">About</a></li>
        </ul>
      </nav>
    </hgroup>
    <hgroup class="header-right">
      <input type="search" placeholder="Search products..." id="search-input" class="search-bar">
      <button id="search-button" class="search-bar" onclick="">
        <img class="icon-search" src="../images/icon-search.png">
      </button>
      <div id="search-dropdown" class="search-bar"></div>
      <a href="cart.html">
        <img class="icon-cart" src="../images/icon-cart.png">
        <span id="cart-count"></span>
      </a>
      <a href="login.html">
        <img class="icon-account" src="../images/icon-account.png">
      </a>
    </hgroup>
  </header>

  <main class="main-container">
    <div class="product-container">
      <div class="product-group">
        <div class="product-content">
          <img id="product-image" src="" alt="Product Image">
        </div>
        <div class="product-content">
          <label class="product-label for=" product-title>Title: </label>
          <p id="product-title"></p>
          <label class="product-label" for="product-description">Description: </label>
          <p id="product-description"></p>
          <label class="product-label" for="product-price">Price: </label>
          <p id="product-price"></p>
          <label class="product-label" for="product-sku">Stock: </label>
          <p id="product-sku"></p>
          <label class="product-label" for="product-availability">Availabilty: </label>
          <p id="product-availability"></p>
          <label class="product-label" for="product-quantity">Quantity: </label>
          <input type="number" id="product-quantity" value="1" min="1">
          <button id="AddToCart">Add to cart</button>
        </div>
      </div>
    </div>

    <div class="recommended-products">
      <h1>YOU MAY ALSO LIKE</h1>
      <div class="carousel-slides">
        <div class="carousel-group"></div>
        <div aria-hidden class="carousel-group"></div>
      </div>
    </div>
  </main>

  <footer class="footer-container">
    <div class="footer-group">
      <div class="footer-content-1">
        <h3>Shop by Category</h3>
        <ul>
          <li><a href="plp.html">Men's Clothing</a></li>
          <li><a href="plp.html">Women's Clothing</a></li>
          <li><a href="plp.html">Jewelry</a></li>
          <li><a href="plp.html">Electronics</a></li>
        </ul>
      </div>
      <div class="footer-content-2">
        <h3>Contact Us</h3>
        <p>Email: support@example.com</p>
        <p>Phone: +1 (514)-555-5555</p>
      </div>
      <div class="footer-content-3">
        <h3>Subcribe to our Newsletter</h3>
        <input type="email" placeholder="Your email address">
        <button id="subscribe-button">Subscribe</button>
      </div>
      <div class="footer-content-4">
        <h3>Follow Us</h3>
        <a href="#"><img src="../images/icon-facebook.png" alt="">
          <a href="#"><img src="../images/icon-twitter.png" alt="">
            <a href="#"><img src="../images/icon-instagram.png" alt="">
      </div>
    </div>
  </footer>
</body>

</html>
