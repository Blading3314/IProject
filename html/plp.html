<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Listings Prage</title>
  <link type="text/css" href="../css/plp.css" rel="stylesheet">
  <link type="text/css" href="../css/header.css" rel="stylesheet">
  <link type="text/css" href="../css/footer.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script type="text/javascript" src="../js/plp.js" defer></script>
  <script type="text/javascript" src="../js/header.js"></script>
  <script type="text/javascript" src="../js/footer.js"></script>
</head>

<body>
  <header id="header-container"></header>

  <main class="main-container">
    <h1>Product List</h1>
    <div class="product-container">
      <aside class="filter-group">
        <h3>Filters</h3>
        <label for="category-filter">Category</label>
        <select id="category-filter">
          <option>All Categories</option>
          <option>Men's Clothing</option>
          <option>Women's Clothing</option>
          <option>Jewelery</option>
          <option>Electronics</option>
        </select>

        <label for="price-sort">Sort By Price</label>
        <select id="price-sort">
          <option>Default</option>
          <option>Low-High</option>
          <option>High-Low</option>
        </select>

        <label id="price-range-label" for="price-range">
          Max Price: <span id="price-value">$0</span>
        </label>
        <input type="range" id="price-range" min="0" max="" value="1000">
      </aside>
      <div class="product-listings">
        <div id="product-list"></div>
      </div>
    </div>
  </main>

  <footer id="footer-container"></footer>
</body>

</html>
